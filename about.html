<div class="card">
    <h2>About Page</h2>

    <p>
        This project demonstrates:
    </p>

   
    <div ng-controller="MovieController">
        <h3>Your Collection Summary</h3>
        <p>Total movies saved: <strong>{{ totalMovies() }}</strong></p>
        <div ng-if="lastAdded()">
            <h4>Last added movie</h4>
            <p>Title: <strong>{{ lastAdded().Title }}</strong></p>
            <p>Year: {{ lastAdded().Year }}</p>
            <img ng-src="{{ lastAdded().Poster }}" width="120" ng-if="lastAdded().Poster">
        </div>
        <p ng-if="!lastAdded()">No movies saved yet.</p>
    </div>
</div>
