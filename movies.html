<div class="card">

    <h2>Movie Search</h2>

    <input
        type="text"
        ng-model="movie"
        placeholder="Enter movie name">

    <button ng-click="searchMovie()">
        Search
    </button>

    <div class="movie-box" ng-repeat="m in movies">

        <img ng-src="{{m.Poster}}" width="120">

        <h3>{{m.Title}}</h3>

        <p>Year: {{m.Year}}</p>

    </div>

</div>
